name: 'Synoptic GitHub'
description: 'Regenerate a profile README from your GitHub repositories, grouped by self-labeled topic. Bun.'
branding:
  icon: 'grid'
  color: 'green'
inputs:
  GITHUB_TOKEN:
    description: 'A token that can read your repositories.'
    required: true
  group-by:
    description: 'topic | language | none'
    required: false
    default: 'topic'
  orgs:
    description: 'Comma-separated orgs whose public repos to include (e.g. bounded-systems)'
    required: false
    default: ''
  out:
    description: 'Output file to write.'
    required: false
    default: 'README.md'
  thesis:
    description: 'One-paragraph thesis (your bet, in plain language); rendered as a lead blockquote under the bio. Empty = none.'
    required: false
    default: ''
  read-first:
    description: 'Funnel link: "Label | https://url" (or just a URL) -> a prominent "Start here" line. Empty = none.'
    required: false
    default: ''
  banner:
    description: 'Path prefix for a theme-aware SVG banner; emits <picture> with <prefix>-dark.svg / <prefix>-light.svg. Empty = no banner.'
    required: false
    default: ''
  featured:
    description: 'Comma-separated repo names to highlight in a Featured section (in order); pulled out of the topic groups.'
    required: false
    default: ''
  filter:
    description: 'Comma-separated topics to query: only repos carrying one of these topics are shown. Empty = all.'
    required: false
    default: ''
  inject-into:
    description: 'Region-injection: file to inject the grouped list into (between <!-- MARKER:start/end -->), preserving the rest. Overrides full-render.'
    required: false
    default: ''
  marker:
    description: 'Marker name for region-injection.'
    required: false
    default: 'synoptic'
runs:
  using: 'composite'
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: latest
    - name: Install deps (frozen)
      shell: bash
      working-directory: ${{ github.action_path }}
      run: bun install --frozen-lockfile
    - name: Source epoch (reproducible stamp)
      shell: bash
      run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
    - name: Generate
      shell: bash
      run: bun "${{ github.action_path }}/synoptic.ts"
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        GH_USER: ${{ github.repository_owner }}
        ORGS: ${{ inputs.orgs }}
        GROUP_BY: ${{ inputs.group-by }}
        OUT: ${{ inputs.out }}
        THESIS: ${{ inputs.thesis }}
        READ_FIRST: ${{ inputs.read-first }}
        BANNER: ${{ inputs.banner }}
        FEATURED: ${{ inputs.featured }}
        FILTER: ${{ inputs.filter }}
        INJECT_INTO: ${{ inputs.inject-into }}
        MARKER: ${{ inputs.marker }}
        GITHUB_SHA: ${{ github.sha }}
    - name: Commit if changed
      shell: bash
      run: |
        if ! git diff --quiet; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh repositories (synoptic)"
          git push
        else
          echo "no change"
        fi
