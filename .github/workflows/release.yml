name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Build container image
        run: nix build .#container
      - name: Push to GHCR
        run: |
          VERSION=${GITHUB_REF_NAME}
          MAJOR=$(echo "$VERSION" | sed 's/v\([0-9]*\).*/\1/')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker load < result
          docker tag ghcr.io/bdelanghe/synoptic-github:latest ghcr.io/bdelanghe/synoptic-github:${VERSION}
          docker tag ghcr.io/bdelanghe/synoptic-github:latest ghcr.io/bdelanghe/synoptic-github:${MAJOR}
          docker push ghcr.io/bdelanghe/synoptic-github:latest
          docker push ghcr.io/bdelanghe/synoptic-github:${VERSION}
          docker push ghcr.io/bdelanghe/synoptic-github:${MAJOR}

  jsr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Publish to JSR
        run: bunx jsr publish --allow-slow-types
