name: ci

# Lightweight PR gate: run the unit suite (pure render + status layers) on every
# push and PR. Kept off nix here on purpose — setup-bun is the fast path; the nix
# build is exercised by release.yml on tags.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
